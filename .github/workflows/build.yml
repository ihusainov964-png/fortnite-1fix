name: Build FortniteFix.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install customtkinter pyinstaller

    - name: Build .exe
      run: |
        pyinstaller --onefile --noconsole --name "FortniteFix_v6" FortniteFixApp.py

    - name: Upload .exe as artifact
      uses: actions/upload-artifact@v4
      with:
        name: FortniteFix_v6_exe
        path: dist/FortniteFix_v6.exe
